name: Déploiement Firebase Hosting

# Déclenché à chaque push sur `main` : build du site puis déploiement sur le
# canal de production (live) de Firebase Hosting.
on:
  push:
    branches: [main]

# Évite les déploiements concurrents : un nouveau push annule le précédent.
concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Vaut 'true' seulement quand le secret du compte de service existe.
      # Tant qu'il est absent, le build tourne mais le déploiement est sauté
      # proprement (run vert) au lieu d'échouer.
      HAS_DEPLOY_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAREPUBLIQUE_7ECFC != '' }}

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Build de production
        run: npm run build
        env:
          # Configuration Firebase Web (clés publiques, non secrètes).
          # Renseignez ces secrets dans GitHub si vous activez des
          # fonctionnalités SDK ; sinon le build fonctionne sans.
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Déploiement sur Firebase Hosting (live)
        if: env.HAS_DEPLOY_KEY == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAREPUBLIQUE_7ECFC }}
          projectId: marepublique-7ecfc
          channelId: live
