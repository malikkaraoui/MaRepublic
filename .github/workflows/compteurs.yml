# Met à jour les compteurs publics de votes (document Firestore
# `compteurs/global`) toutes les heures. Les réactions individuelles
# restent fermées : seuls les totaux sortent.
name: Compteurs de votes

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

jobs:
  agreger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Présence du compte de service
        id: cle
        env:
          # Passer par une variable d'environnement : le secret est un JSON
          # multi-ligne, l'injecter en clair dans la condition casserait la
          # ligne bash (les retours à la ligne coupent le test).
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAREPUBLIQUE_7ECFC }}
        run: |
          if [ -n "$SA" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "Secret du compte de service absent : étape sautée proprement."
          fi

      - name: Installation de Node.js
        if: steps.cle.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Agrégation des votes
        if: steps.cle.outputs.ok == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAREPUBLIQUE_7ECFC }}
        run: node scripts/maj-compteurs.mjs
